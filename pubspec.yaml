name: promoto_app
description: "Promoto - Local Business Growth Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase and Auth
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  google_sign_in: ^6.2.2

  # HTTP Client
  dio: ^5.7.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17

  # Utilities
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  syncfusion_flutter_gauges: ^34.1.31
  lottie: ^3.5.1
  animated_text_kit: ^4.3.0
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
